spring:
  application:
    version: 1.0.0-prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

logging:
  level:
    root: warn
    com.hireikon: info
    org.hibernate.SQL: warn

app:
  jwt:
    secret: ${ENCODED_JWT_SECRET_KEY_BASE64}
    access-token-expiration-ms: 3600000     # 1 hour
    refresh-token-expiration-ms: 604800000  # 7 days
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash
  supabase:
    url: ${SUPABASE_URL}
    anon-key: ${SUPABASE_ANON_KEY}
    resume-storage-bucket: resumes
    profile-avatar-storage-bucket: profile_avatars
  cors:
    allowed-origins: "${FRONTEND_URL}"